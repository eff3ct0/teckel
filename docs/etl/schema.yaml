input:
  - name: rawData
    format: csv
    path: 'data/csv/raw.csv'
    options:
      header: true
      inferSchema: true

transformation:
  - name: typed
    castColumns:
      from: rawData
      columns:
        - name: id
          targetType: integer
        - name: amount
          targetType: double
        - name: created_at
          targetType: timestamp

  - name: enforced
    schemaEnforce:
      from: typed
      mode: strict
      columns:
        - name: id
          dataType: integer
          nullable: false
        - name: amount
          dataType: double
          nullable: true
          default: '0.0'
        - name: created_at
          dataType: timestamp
          nullable: true

  - name: evolved
    schemaEnforce:
      from: rawData
      mode: evolve
      columns:
        - name: id
          dataType: integer
          nullable: false
        - name: amount
          dataType: double
        - name: status
          dataType: string
          default: "'unknown'"

output:
  - name: enforced
    format: parquet
    mode: overwrite
    path: 'data/parquet/enforced'
