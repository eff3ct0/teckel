input:
  - name: table1
    format: csv
    path: 'data/csv/example.csv'
    options:
      header: true
      sep: '|'

transformation:
  - name: uniqueTable1
    distinct:
      from: table1
  - name: topRows
    limit:
      from: uniqueTable1
      count: 100

output:
  - name: topRows
    format: parquet
    mode: overwrite
    path: 'data/parquet/example'
