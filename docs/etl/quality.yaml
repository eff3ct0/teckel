input:
  - name: orders
    format: parquet
    path: 'data/parquet/orders'

transformation:
  - name: validated_orders
    assertion:
      from: orders
      checks:
        - column: customer_id
          rule: not_null
          description: 'Customer ID must not be null'
        - column: amount
          rule: 'amount > 0'
          description: 'Amount must be positive'
        - rule: 'order_date IS NOT NULL'
          description: 'Order date must be present'
      onFailure: fail

output:
  - name: validated_orders
    format: parquet
    mode: overwrite
    path: 'data/parquet/validated_orders'
