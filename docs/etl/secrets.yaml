secrets:
  keys:
    db_password:
      scope: my-keyvault
      key: database-password

input:
  - name: dbSource
    format: jdbc
    options:
      url: 'jdbc:postgresql://host:5432/db'
      user: admin
      password: '{{secrets.db_password}}'

output:
  - name: dbSource
    format: parquet
    mode: overwrite
    path: 'data/parquet/db_export'
