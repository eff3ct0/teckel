  <text x="270" y="178" font-family="'Geist Mono', ui-monospace, monospace" font-size="12" fill="#52525b" text-anchor="middle">api</text>

  <!-- api → cli -->
  <path d="M270 192 L270 202" stroke="#d4d4d8" stroke-width="1.5" stroke-linecap="round"/>
