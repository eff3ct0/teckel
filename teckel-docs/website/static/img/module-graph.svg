  <path d="M200 120 L250 154" stroke="#d4d4d8" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M246 150 L251 155 L257 151" stroke="#d4d4d8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

