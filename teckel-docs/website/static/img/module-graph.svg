  <text x="270" y="34" font-family="'Geist Mono', ui-monospace, monospace" font-size="12" fill="#52525b" text-anchor="middle">model</text>

  <!-- model → serializer -->
  <path d="M240 48 L200 82" stroke="#d4d4d8" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M196 78 L201 83 L207 79" stroke="#d4d4d8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- model → semantic -->
  <path d="M300 48 L340 82" stroke="#d4d4d8" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M336 78 L341 83 L347 79" stroke="#d4d4d8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

