  <text x="180" y="106" font-family="'Geist Mono', ui-monospace, monospace" font-size="12" fill="#52525b" text-anchor="middle">serializer</text>

  <!-- semantic -->
  <rect x="310" y="82" width="100" height="38" rx="6" stroke="#e4e4e7" stroke-width="1.5" fill="transparent"/>
  <text x="360" y="106" font-family="'Geist Mono', ui-monospace, monospace" font-size="12" fill="#52525b" text-anchor="middle">semantic</text>

