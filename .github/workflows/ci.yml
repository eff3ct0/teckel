name: CI

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Check formatting and license headers ────────────────────────────
  validate:
    name: Validate (format & headers)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11
          cache: sbt

      - uses: sbt/setup-sbt@v1

      - name: Check license headers
        run: sbt headerCheckAll

      - name: Check formatting
        run: sbt scalafmtCheckAll

  # ── Compile and test across Java versions ───────────────────────────
  test:
    name: Test (Java ${{ matrix.java }})
    needs: validate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: [8, 11, 17]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: sbt

      - uses: sbt/setup-sbt@v1

      - name: Build and test with coverage
        run: sbt clean coverage test coverageReport coverageAggregate

      - name: Upload coverage to Codecov
        if: matrix.java == 11
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: eff3ct0/teckel
          files: target/scala-*/scoverage-report/scoverage.xml
          fail_ci_if_error: true

  # ── Build Docker image ───────────────────────────────────────────────
  docker:
    name: Docker build
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t teckel:test .
